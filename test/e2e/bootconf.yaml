bootconf:
  enabled: true
  directory: /data/bootconf

system:
  enabled: false
  timezone: UTC
  hostname: e2e-test

ssh:
  enabled: true
  directory: /data/config/ssh
  daemon: dropbear
  keytype: ed25519
  generate_host_keys: false

wifi:
  enabled: true
  directory: /data/config/wifi
  ssid: TestNetwork
  password_hash: a2b3c4d5e6f7a2b3c4d5e6f7a2b3c4d5e6f7a2b3c4d5e6f7a2b3c4d5e6f7a2b3
  country: NL

services:
  enabled: true
  directory: /data/config/services
  services:
    - name: testservice
      enabled: true
      sentinel: true
      default_config:
        copy: true
        source: /boot/firmware/config/test.conf
        destination: /data/config/testservice/test.conf
    - name: daemon
      enabled: true
      sentinel: true
      default_config:
        copy: true
        source: /boot/firmware/config/daemon.conf
        destination: /data/config/daemon/daemon.conf
    - name: monitor
      enabled: true
      sentinel: false
      default_config:
        copy: true
        source: /boot/firmware/config/monitor.conf
        destination: /data/config/monitor/monitor.conf
    - name: disabled-svc
      enabled: false
      sentinel: true

users:
  enabled: true
  directory: /data/config/users
  users:
    - name: admin
      enabled: true
      sudo: true
      home: /data/home/admin
      authorized_keys:
        - "ssh-ed25519 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCY1/jmHp/cSIPfG388BbaP/kISOKnsvPiMgLYm/vUsOFIvXfxqPo5Xh5r8wfwUQrjw1iLb3DYp6FWKEzAGpJRs= test@e2e"
    - name: operator
      enabled: true
      sudo: false
      home: /data/home/operator
      authorized_keys:
        - "ssh-ed25519 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCY1/jmHp/cSIPfG388BbaP/kISOKnsvPiMgLYm/vUsOFIvXfxqPo5Xh5r8wfwUQrjw1iLb3DYp6FWKEzAGpJRs= operator@e2e"
        - "ssh-rsa  operator2@e2e"
    - name: auditor
      enabled: true
      sudo: false
      home: /data/home/auditor
      authorized_keys: []

files:
  enabled: true
  files:
    - source: /boot/firmware/config/app.conf
      destination: /data/config/app/app.conf
      chmod: "640"
    - source: /boot/firmware/config/secret.key
      destination: /data/config/secrets/secret.key
      chmod: "600"
    - source: /boot/firmware/config/monitor.conf
      destination: /data/config/app/monitor.conf
      chmod: "644"
    - content: |
        [e2e]
        test=true
      destination: /data/config/app/inline.conf
      chmod: "640"

templates:
  enabled: true
  templates:
    - source: /boot/firmware/config/app.conf.tpl
      destination: /data/config/app/rendered.conf
      chmod: "640"
      variables:
        app_name: bootconf-e2e
        env: testing

shell:
  enabled: true
  directory: /data/bootconf/shell
  commands:
    - name: hello-world
      allow_fail: false
      firstboot: false
      command: echo "hello from shell"
    - name: first-boot-only
      allow_fail: false
      firstboot: true
      command: echo "first boot setup"

unitrun:
  enabled: true
  directory: /data/bootconf/scripts
  firstboot: false
  units:
    - name: e2e-task
      enabled: true
      dependencies:
        - After=multi-user.target
      command: |
        echo "e2e task ran"
        exit 0
