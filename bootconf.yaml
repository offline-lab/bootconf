#
# Bootconf configuration for testing and development
#
bootconf:
  enabled: true
  directory: /data/bootconf
  order:
  - system
  - users
  - wifi
  - ssh
  - services
  - files
  - templates
  - unitrun
  - shell

system:
  enabled: true
  timezone: Europe/Amsterdam
  hostname: offline-lab

users:
  enabled: true
  directory: /data/config/users
  tmpfiles_dir: /data/config/tmpfiles
  users:
  - name: offlinelab
    enabled: true
    sudo: true
    home: /data/home/offlinelab
    authorized_keys:
    - "ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCY1/jmHp/cSIPfG388BbaP/kISOKnsvPiMgLYm/vUsOFIvXfxqPo5Xh5r8wfwUQrjw1iLb3DYp6FWKEzAGpJRs= flip@fliphess.com"

wifi:
  enabled: true
  directory: /data/config/wifi
  ssid: something
  password_hash: 'dummydummydummydummydummydummydummy'
  country: NL

ssh:
  enabled: true
  directory: /data/config/ssh
  keytype: ed25519
  generate_host_keys: true
  daemon: dropbear

services:
  enabled: true
  directory: /data/config/services
  services:
  - name: disco
    enabled: true
    sentinel: true
    default_config:
      copy: true
      source: /etc/disco/config.yaml
      destination: /data/config/disco/config.yaml

files:
  enabled: true
  files:
  - source: /etc/motd
    destination: /data/config/motd
    chmod: 640

templates:
  enabled: true
  templates:
  - source: /etc/template.tpl
    chmod: 640
    destination: /data/config/message
    variables:
      name: Offline Lab OS
      hostname: offline-lab

shell:
  enabled: false
  directory: /data/bootconf/shell
  path: "/usr/lib/framework/library:/usr/lib/framework/bin"
  commands: []
  # - name: get-process-list
  #   allow_fail: true
  #   firstboot: true
  #   command: |
  #     bash -c 'ps -ef'
  # - name: get-df
  #   allow_fail: false
  #   firstboot: false
  #   command: df /

unitrun:
  enabled: false
  directory: /data/bootconf/unitrun
  path: "/usr/lib/framework/library:/usr/lib/framework/bin"
  units: []
  # - name: some-name
  #   enabled: true
  #   firstboot: false
  #   dependencies:
  #     - After=multi-user.target
  #     - Before=shutdown.target
  #     - Conflicts=shutdown.target
  #   command: |
  #     a bunch of commands here
  #     to run several things
  #     in a script
  #     exit 0
