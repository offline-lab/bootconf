[project]

site_name = "bootconf"
site_description = "Declarative boot configuration for Linux."
site_author = "Offline Lab"
site_url = "https://bootconf.offline-lab.com"
home_page_url = "https://bootconf.offline-lab.com"

copyright = "Copyright &copy; 2026 Offline Lab"

repo_name = "offline-lab/bootconf"
repo_url  = "https://github.com/offline-lab/bootconf"
edit_uri  = "https://github.com/offline-lab/bootconf/edit/main/docs/"
docs_dir = "docs"
site_dir = "docs/public"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Configuration" = "configuration.md" },
  { "Modules" = [
    { "System" = "modules/system.md" },
    { "SSH" = "modules/ssh.md" },
    { "WiFi" = "modules/wifi.md" },
    { "Services" = "modules/services.md" },
    { "Users" = "modules/users.md" },
    { "Files" = "modules/files.md" },
    { "Templates" = "modules/templates.md" },
    { "Shell" = "modules/shell.md" },
    { "UnitRun" = "modules/unitrun.md" },
  ]},
]

[project.theme]
language = "en"
custom_dir = "docs/overrides"
features = [
    "content.code.copy",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "announce.dismiss",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/offline-lab"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
