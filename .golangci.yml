version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - revive
    - unused
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: unreachable-code
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: unnecessary-stmt
    staticcheck:
      checks:
        - "all"
        - "-QF1001"
  exclusions:
    rules:
      - text: "and that stutters"
        linters:
          - revive

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
